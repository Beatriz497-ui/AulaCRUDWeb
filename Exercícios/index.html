<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AwesomeAPI - Cotações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Conversor de Moedas</h1>
        
        <div class="controles">
            <select id="moeda-select">
                <option value="USD-BRL">Dólar para Real</option>
                <option value="EUR-BRL">Euro para Real</option>
                <option value="BTC-BRL">Bitcoin para Real</option>
            </select>
            <button id="btn-cotacao">Consultar Valor</button>
        </div>

        <div id="resultado" class="card-resultado">
            <p>Selecione uma moeda e clique no botão.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
