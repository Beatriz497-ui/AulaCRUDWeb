<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Cadastro de Unicórnios</title>

</head>

<body>

    <h2>Cadastrar Novo Unicórnio</h2>

    <form id="unicornForm">

        <input type="text" id="name" placeholder="Nome" required>

        <input type="number" id="age" placeholder="Idade" required>

        <input type="text" id="colour" placeholder="Cor" required>

        <button type="submit">Enviar</button>

    </form>



    <div id="resultado"></div>



    <script src="script.js"></script>

</body>

</html>
